services:
  - type: web
    name: multi-agent-ai-research-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=10000 --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: TAVILY_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false